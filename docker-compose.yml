services:

  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: mern-app
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    depends_on:
      - mongo
      - redis
