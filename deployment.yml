apiVersion: apps/v1
kind: Deployment

metadata:
  name: mern-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: mern-app

  template:
    metadata:
      labels:
        app: mern-app

    spec:
      containers:
      - name: mern-app

        image: mern-devops-project

        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        env:
        - name: PORT
          value: "5000"

        - name: MONGO_URI
          value: "mongodb://host.minikube.internal:27017/ecommerce"

        - name: UPSTASH_REDIS_URL
          value: "redis://host.minikube.internal:6379"

        - name: ACCESS_TOKEN_SECRET
          value: "myaccesssecret"

        - name: REFRESH_TOKEN_SECRET
          value: "myrefreshsecret"

        - name: CLOUDINARY_CLOUD_NAME
          value: "test"

        - name: CLOUDINARY_API_KEY
          value: "test"

        - name: CLOUDINARY_API_SECRET
          value: "test"

        - name: STRIPE_SECRET_KEY
          value: "test"

        - name: CLIENT_URL
          value: "http://localhost:5173"

        - name: NODE_ENV
          value: "development"
